<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Noto Sans TC',sans-serif}
.card{width:1200px;height:630px;background:linear-gradient(135deg,#003d2a 0%,#006648 45%,#00a06e 80%,#00c88a 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden}
.pattern{position:absolute;inset:0;opacity:0.07;background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:50px 50px}
.globe{font-size:120px;margin-bottom:24px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.3))}
.title{font-size:72px;font-weight:700;color:#fff;letter-spacing:-2px;margin-bottom:16px;text-shadow:0 4px 20px rgba(0,0,0,0.3)}
.title em{color:#7dffd4;font-style:italic}
.sub{font-size:28px;color:rgba(255,255,255,0.75);margin-bottom:32px}
.badges{display:flex;gap:16px}
.badge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:18px;padding:10px 24px;border-radius:24px}
.corner{position:absolute;bottom:32px;right:40px;font-size:22px;font-weight:700;color:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<div class="card">
  <div class="pattern"></div>
  <div class="globe">🌍</div>
  <div class="title">Wandr — <em>AI 旅遊規劃</em></div>
  <div class="sub">輸入目的地，30秒生成完整旅遊行程</div>
  <div class="badges">
    <span class="badge">✨ 完全免費</span>
    <span class="badge">🗺 全球目的地</span>
    <span class="badge">🏨 住宿比價</span>
    <span class="badge">📄 匯出PDF</span>
  </div>
  <div class="corner">lin-809.github.io</div>
</div>
</body>
</html>
